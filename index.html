<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Drone Defender</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Import map lets Three.js add-ons resolve their own 'three' bare import -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ── Top HUD ── -->
  <div id="ui">
    <div id="hud-top">
      <div class="hud-panel">
        <div class="hud-label">SCORE</div>
        <div id="hud-score" class="hud-value">0</div>
      </div>
      <div class="hud-panel" style="text-align:center">
        <div class="hud-label">WAVE</div>
        <div id="hud-wave" class="hud-value">–</div>
      </div>
      <div class="hud-panel" style="text-align:right">
        <div class="hud-label">DRONES</div>
        <div id="hud-drones" class="hud-value">0</div>
      </div>
    </div>
  </div>

  <!-- ── Ability bar ── -->
  <div id="abilities-bar">
    <div class="ability-slot ready" id="slot-scan" onclick="window.game?.useAbility('scan')">
      <div class="ability-key">[1]</div>
      <div class="ability-name">SCAN</div>
      <div class="ability-timer" id="cd-scan">READY</div>
    </div>
    <div class="ability-slot ready" id="slot-emp" onclick="window.game?.useAbility('emp')">
      <div class="ability-key">[2]</div>
      <div class="ability-name">EMP</div>
      <div class="ability-timer" id="cd-emp">READY</div>
    </div>
    <div class="ability-slot ready" id="slot-turret" onclick="window.game?.useAbility('turret')">
      <div class="ability-key">[3]</div>
      <div class="ability-name">TURRET</div>
      <div class="ability-timer" id="cd-turret">READY</div>
    </div>
  </div>

  <!-- ── Crosshair ── -->
  <div id="crosshair"></div>

  <!-- ── Base HP ── -->
  <div id="base-hp-bar">
    <div class="bar-label">PLAYER HEALTH</div>
    <div class="bar-track">
      <div id="base-hp-fill" class="bar-fill"></div>
    </div>
  </div>

  <!-- ── Wave announcement ── -->
  <div id="wave-announce"></div>

  <!-- Overlay kept for ui.js compat but hidden; 3-D panel handles start/game-over -->
  <div id="overlay" class="hidden" style="display:none">
    <h1 id="overlay-title">VR DRONE DEFENDER</h1>
    <p id="overlay-sub"></p>
    <button id="overlay-btn" onclick="window.game?.start()">START</button>
  </div>

  <!-- ── VR button injected by Three.js ── -->
  <div id="vr-button-container"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
